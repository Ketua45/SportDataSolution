services:

  # ── 1. Cheering Bot Slack ────────────────────────────────────────────────
  # Consomme le topic Redpanda et envoie une notification Slack pour chaque
  # nouvelle activité sportive enregistrée.
  cheering-bot:
    build:
      context: ..                          # racine du projet
      dockerfile: docker/cheering-bot/Dockerfile
    env_file: ../.env
    # network_mode host : accède à Redpanda (127.0.0.1:9092) et PostgreSQL
    # (192.168.1.177) comme s'il tournait directement sur la machine hôte.
    # Sur Linux uniquement — remplacer par un bridge + extra_hosts sur macOS/Windows.
    network_mode: host
    restart: unless-stopped

  # ── 2. Redpanda → S3 Parquet ─────────────────────────────────────────────
  # Lit en streaming le topic CDC Redpanda et écrit les événements sportifs
  # en Parquet sur S3 (Bronze layer).
  redpanda-to-s3:
    build:
      context: ..
      dockerfile: docker/spark/Dockerfile
    env_file: ../.env
    network_mode: host
    restart: unless-stopped
    command: >
      spark-submit
      --master local[2]
      --packages org.apache.hadoop:hadoop-aws:3.4.2,org.apache.spark:spark-sql-kafka-0-10_2.13:4.1.1
      /app/redpanda_to_s3_parquet.py

  # ── 3. Streaming Silver — Mobilité & Sport ───────────────────────────────
  # Surveille le répertoire Parquet S3, enrichit chaque micro-batch avec les
  # données employés / mobilité PostgreSQL et écrit en Parquet Silver sur S3.
  streaming-silver:
    build:
      context: ..
      dockerfile: docker/spark/Dockerfile
    env_file: ../.env
    network_mode: host
    restart: unless-stopped
    # Démarre après redpanda-to-s3 pour s'assurer que des fichiers Parquet
    # existent déjà dans le répertoire source avant la première surveillance.
    depends_on:
      - redpanda-to-s3
    command: >
      spark-submit
      --master local[2]
      --packages org.apache.hadoop:hadoop-aws:3.4.2,org.postgresql:postgresql:42.7.3
      /app/streaming_silver_mobilite_sport.py

  # ── 4. Pipeline Exporter ──────────────────────────────────────────────────
  # Lit silver_latest.parquet sur S3 toutes les 60 s et expose les métriques
  # métier (activités, employés) sur :9101 pour Prometheus.
  pipeline-exporter:
    build:
      context: ..
      dockerfile: docker/monitoring/Dockerfile
    env_file: ../.env
    network_mode: host
    restart: unless-stopped
    depends_on:
      - streaming-silver

  # ── 5. Prometheus ─────────────────────────────────────────────────────────
  # Collecte les métriques système (node_exporter), containers (cadvisor)
  # et pipeline (pipeline-exporter). Interface : http://localhost:9090
  prometheus:
    image: prom/prometheus:latest
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.listen-address=:9091'

  # ── 6. Grafana ────────────────────────────────────────────────────────────
  # Dashboard de visualisation. Interface : http://localhost:3000
  # Login par défaut : admin / admin
  grafana:
    image: grafana/grafana:latest
    network_mode: host
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_HTTP_PORT=3000
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # ── 7. Node Exporter ─────────────────────────────────────────────────────
  # Métriques système de la machine hôte (CPU, RAM, disque). Port : 9100
  node-exporter:
    image: prom/node-exporter:latest
    network_mode: host
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

  # ── 8. cAdvisor ──────────────────────────────────────────────────────────
  # Métriques des containers Docker (CPU, mémoire par container). Port : 8080
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    network_mode: host
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro

volumes:
  prometheus_data:
  grafana_data:
